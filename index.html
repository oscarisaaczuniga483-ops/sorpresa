<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Monsi ❤️</title>
    <style>
        /* --- ESTILOS CSS (DISEÑO Y ANIMACIONES) --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; /* Evita que salgan barras de desplazamiento */
            background-color: black;
            font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- FONDO ESPACIAL (ESTRELLAS) --- */
        #space-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000 url('https://i.imgur.com/Y4M9Z4P.png') repeat top center;
            z-index: 0;
        }

        /* --- CONTENEDOR DE FOTOS --- */
        #heart-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: none; /* Empieza oculto */
            z-index: 10;
        }

        /* --- ESTILO DE CADA MARCO DE FOTO --- */
        .photo-frame {
            position: absolute;
            width: 15vw;  /* Tamaño relativo al ancho de la pantalla (muy importante para móvil) */
            height: 15vw; /* Hacemos que sea cuadrada */
            max-width: 80px; /* Tamaño máximo para que no se vea gigante en PC */
            max-height: 80px;
            border: 2px solid white;
            border-radius: 8px;
            overflow: hidden;
            background: white; /* Por si la foto tarda en cargar */
            opacity: 0; /* Empiezan invisibles */
            
            /* Brillo Rosa Neón (Neon Glow) - IGUAL QUE EN LA IMAGEN */
            box-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 30px #ff007f;
            
            /* Animaciones iniciales al aparecer y flotar */
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1s ease;
        }

        /* La imagen dentro del marco */
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Recorta la foto para que llene el cuadrado sin deformarse */
        }

        /* --- TEXTO INICIAL --- */
        #text-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            backdrop-filter: blur(5px);
            z-index: 20;
            color: #ff007f;
            text-shadow: 0 0 10px #ff007f;
        }

        /* --- CUENTA REGRESIVA --- */
        #countdown-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none; /* Empieza oculto */
            z-index: 30;
        }

        #countdown-number {
            font-size: 120px;
            font-weight: bold;
            color: #ff007f;
            text-shadow: 0 0 20px #ff007f;
        }
    </style>
</head>
<body>

    <div id="space-background"></div>

    <div id="text-card">
        <h1>¡Monsi!</h1>
        <p>Prepara tus ojos... tengo algo para ti.</p>
    </div>

    <div id="countdown-container">
        <div id="countdown-number">3</div>
    </div>

    <div id="heart-container">
        </div>

    <script>
        // --- JAVASCRIPT (LÓGICA Y MATEMÁTICAS) ---

        // Configuración
        const numFotos = 13; // Ajusta si tienes más o menos fotos (mínimo 13)
        const tiempoTexto = 5000; // 5 segundos para leer el texto inicial

        window.onload = function() {
            // Referencias a elementos
            const textCard = document.getElementById('text-card');
            const countdownContainer = document.getElementById('countdown-container');
            const countdownNumber = document.getElementById('countdown-number');
            const heartContainer = document.getElementById('heart-container');

            // --- INICIAR SECUENCIA ---
            
            // Paso 1: Mostrar texto por unos segundos
            setTimeout(() => {
                textCard.style.display = 'none';
                iniciarCuentaRegresiva();
            }, tiempoTexto);

            // Paso 2: Cuenta Regresiva
            function iniciarCuentaRegresiva() {
                countdownContainer.style.display = 'block';
                let count = 3;
                
                const interval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countdownNumber.innerText = count;
                    } else {
                        clearInterval(interval);
                        countdownContainer.style.display = 'none';
                        crearFotosYFormarCorazon();
                    }
                }, 1000);
            }

            // Paso 3: Crear Fotos y Formar Corazón
            function crearFotosYFormarCorazon() {
                heartContainer.style.display = 'block';
                const frames = [];

                // Ecuación matemática del corazón
                function getHeartPoint(t, scale) {
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    return { x: x * scale, y: y * scale };
                }

                const width = window.innerWidth;
                const height = window.innerHeight;
                
                // Escala del corazón según la pantalla
                const heartScale = Math.min(width, height) * 0.022; // Ajustado para móvil y PC

                for (let i = 1; i <= numFotos; i++) {
                    const frame = document.createElement('div');
                    frame.className = 'photo-frame';
                    frame.id = `photo-${i}`;

                    const img = document.createElement('img');
                    // IMPORTANTE: Tus fotos deben llamarse foto1.jpg, foto2.jpg...
                    img.src = `foto${i}.jpg`; 
                    img.alt = `Monsi ${i}`;

                    // Manejo de errores si la foto no carga
                    img.onerror = function() {
                        frame.innerHTML = '<span style="color:black; font-size:10px; display:flex; justify-content:center; align-items:center; height:100%;">📸</span>';
                    };

                    frame.appendChild(img);
                    heartContainer.appendChild(frame);
                    frames.push(frame);

                    // --- CÁLCULO DE POSICIÓN EXACTA DEL CORAZÓN ---
                    // 't' va de 0 a 2*PI para dibujar la curva completa
                    const t = (i / numFotos) * 2 * Math.PI;
                    const point = getHeartPoint(t, heartScale);

                    // Centrar las fotos
                    const finalX = (point.x) + (width / 2) - 40; // Ajuste mitad del tamaño foto
                    const finalY = (point.y) + (height / 2) - 40;

                    // Posición inicial (todas en el centro, invisibles)
                    frame.style.left = `${width / 2 - 40}px`;
                    frame.style.top = `${height / 2 - 40}px`;
                    frame.style.transform = `scale(0.1) rotate(${(Math.random()-0.5)*180}deg)`;

                    // Animarlas hacia su posición final en el corazón
                    setTimeout(() => {
                        frame.style.opacity = '1';
                        frame.style.left = `${finalX}px`;
                        frame.style.top = `${finalY}px`;
                        // Un giro aleatorio suave para que se vea orgánico como en la imagen
                        const randomRot = (Math.random() - 0.5) * 30; // +/- 15 grados
                        frame.style.transform = `scale(1) rotate(${randomRot}deg)`;
                    }, i * 150); // Aparecen una por una secuencialmente
                }

                // Paso 4: Activar el efecto de flotación continua
                setTimeout(activarFlotacion, numFotos * 150 + 2000);
            }

            // Flotación sutil para que las fotos se muevan suavemente
            function activarFlotacion() {
                const frames = document.querySelectorAll('.photo-frame');
                frames.forEach(frame => {
                    frame.style.transition = 'all 4s ease-in-out'; // Movimiento muy lento
                    
                    // Función para cambiar de posición sutilmente
                    function moverLentamente() {
                        // Movimiento aleatorio de +/- 5px
                        const moveX = (Math.random() - 0.5) * 10;
                        const moveY = (Math.random() - 0.5) * 10;
                        const rot = (Math.random() - 0.5) * 15; // Girar suavemente
                        
                        // Obtenemos la posición actual
                        const currentLeft = parseFloat(frame.style.left);
                        const currentTop = parseFloat(frame.style.top);

                        frame.style.left = `${currentLeft + moveX}px`;
                        frame.style.top = `${currentTop + moveY}px`;
                        frame.style.transform = `rotate(${rot}deg)`;
                    }

                    // Mover cada 4 segundos
                    moverLentamente(); // Primera vez
                    setInterval(moverLentamente, 4000);
                });
            }
        };
    </script>
</body>
</html>
