<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Monsi ❤️</title>
    <style>
        /* --- ESTILOS GENERALES Y DE FONDO --- */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: black; font-family: 'Arial', sans-serif; color: white; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
     /* --- NUEVO FONDO ESPACIAL SIN IMÁGENES EXTERNAS --- */
#space-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Fondo negro con un degradado sutil */
    background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
    display: none; 
    z-index: 0;
}

/* Efecto de estrellas pequeñas usando sombras (No necesita archivos) */
#space-bg::after {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 2px;
    height: 2px;
    background: transparent;
    /* Generamos cientos de puntitos blancos en posiciones aleatorias */
    box-shadow: 200px 300px #FFF, 500px 100px #FFF, 800px 400px #FFF, 
                150px 600px #FFF, 900px 800px #FFF, 300px 200px #FFF,
                600px 500px #FFF, 100px 700px #FFF, 400px 900px #FFF,
                250px 150px #FFF, 750px 350px #FFF, 850px 650px #FFF;
    opacity: 0.5;
}

        .overlay { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; text-align: center; }
        
        /* --- ESTILO DEL LIBRITO INTERACTIVO (FOTOS Y MENSAJES) --- */
        #booklet-container {
            display: none;
            width: 80%;
            max-width: 400px;
            flex-direction: column;
            gap: 20px;
        }

        /* Caja de Mensajes Variables (Rosa y Elegante) */
        #message-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            color: #ffe0eb;
            font-size: 1.4rem;
            line-height: 1.6;
            text-shadow: 0 0 10px #ff007f;
            min-height: 80px;
            display: flex; align-items: center; justify-content: center;
        }

        /* Pila de Fotos Interactivas (El "Librito") */
        #booklet-stack {
            position: relative;
            width: 100%;
            height: 300px;
            cursor: pointer;
            z-index: 15;
        }

        /* Estilo de cada página del librito */
        .book-page {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid white;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            box-shadow: 0 10px 30px rgba(255, 0, 127, 0.3);
            
            /* Animación de "pasar página" */
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1s;
        }

        /* Aseguramos que solo la página de arriba sea visible */
        .book-page:not(.active) {
            display: none;
        }

        .book-page img { width: 100%; height: 100%; object-fit: cover; }

        /* Icono de ayuda para que ella sepa qué hacer */
        #tap-help { font-size: 0.8rem; color: #ffe0eb; opacity: 0.7; }

        /* --- OTROS ELEMENTOS --- */
        #countdown { font-size: 120px; font-weight: bold; color: #ff007f; text-shadow: 0 0 20px #ff007f; z-index: 20; }
        #start-btn { padding: 15px 30px; font-size: 20px; background: #ff007f; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px #ff007f; z-index: 100; }

        .final-photo-frame {
            position: absolute; width: 75px; height: 75px; border: 2px solid white; border-radius: 5px; 
            overflow: hidden; box-shadow: 0 0 15px #ff007f; transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; z-index: 5;
        }
        .final-photo-frame img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<audio id="musica" loop preload="auto">
    <source src="LATIN MAFIA - Siento que merezco más.mp3" type="audio/mpeg">
</audio>
    <div class="overlay">
        <button id="start-btn">Para Monsi ❤️</button>
        <div id="countdown" style="display:none">3</div>
        
        <div id="booklet-container">
            <div id="message-box">Cargando mensajes...</div>
            <div id="booklet-stack">
                <div class="book-page active" id="page1"><img src="foto1.jpg"></div>
                <div class="book-page" id="page2"><img src="foto2.jpg"></div>
                <div class="book-page" id="page3"><img src="foto3.jpg"></div>
                <div class="book-page" id="page4"><img src="foto4.jpg"></div>
                <div class="book-page" id="page5"><img src="foto5.jpg"></div>
                <div class="book-page" id="page6"><img src="foto6.jpg"></div>
                   <div class="book-page" id="page7"><img src="foto7.jpg"></div>

            </div>

            

        </div>

    </div>

    <canvas id="matrix"></canvas>
    <div id="space-bg"></div>
    <div id="heart-container"></div>

    <script>
        // CONFIGURACIÓN DE MENSAJES QUE CAMBIAN (puedes editar estos textos)
        // He puesto 7 mensajes, uno para cada una de las 7 fotos del librito.
        const mensajesMap = [
            { page: 1, message: "Hola, mi amor... ❤️" },
            { page: 2, message: "Hoy es un día especial para ti y para mí." },
            { page: 3, message: "Cada momento contigo es un regalo." },
            { page: 4, message: "Gracias por tu alegría y tu dulzura." },
            { page: 5, message: "As long as you're smiling, I'm happy." },
            { page: 6, message: "Stay happy, my love. 💖" },
            { page: 7, message: "¡Feliz Cumpleaños, Monsi! ❤️" }
        ];

        const btn = document.getElementById('start-btn');
        const audio = document.getElementById('musica');
        const countdown = document.getElementById('countdown');
        const bookletContainer = document.getElementById('booklet-container');
        const bookletStack = document.getElementById('booklet-stack');
        const messageBox = document.getElementById('message-box');
        const spaceBg = document.getElementById('space-bg');
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        // Matrix Logic
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const phrase = "FELIZCUMPLEAÑOSMONSI";
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff007f"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(phrase.charAt(y % phrase.length), i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        let mInterval;

        btn.onclick = () => {
            btn.style.display = 'none';
            audio.play();
            mInterval = setInterval(drawMatrix, 33);
            setTimeout(iniciarCuenta, 3000); // 3 segs de Matrix
        };

        function iniciarCuenta() {
            canvas.style.opacity = '0';
            countdown.style.display = 'block';
            let c = 3;
            const t = setInterval(() => {
                c--;
                if(c > 0) countdown.innerText = c;
                else {
                    clearInterval(t); countdown.style.display = 'none';
                    mostrarLibrito();
                }
            }, 1000);
        }

        // --- LÓGICA DEL LIBRITO INTERACTIVO ---
        let pageCount = 1;
        function mostrarLibrito() {
            clearInterval(mInterval);
            canvas.style.display = 'none';
            spaceBg.style.display = 'block';
            bookletContainer.style.display = 'flex';
            actualizarMensaje(1);
        }

        function actualizarMensaje(pageIndex) {
            const entry = mensajesMap.find(item => item.page === pageIndex);
            if(entry) {
                messageBox.style.opacity = 0;
                setTimeout(() => {
                    messageBox.innerText = entry.message;
                    messageBox.style.opacity = 1;
                    messageBox.style.transition = "opacity 0.5s";
                }, 300);
            }
        }

        // Qué pasa cuando Monsi toca el librito
        bookletStack.onclick = () => {
            const currentPage = document.getElementById(`page${pageCount}`);
            
            if (pageCount < mensajesMap.length) {
                // Hay más páginas: pasamos página
                currentPage.classList.remove('active');
                
                // Animación de desvanecimiento hacia la izquierda
                currentPage.style.transform = "translateX(-150px) rotate(-20deg)";
                currentPage.style.opacity = '0';
                
                pageCount++;
                const nextPage = document.getElementById(`page${pageCount}`);
                nextPage.classList.add('active');
                
                actualizarMensaje(pageCount);
            } else {
                // Es la última página: pasamos a la explosión final
                // Primero ocultamos el librito
                bookletContainer.style.opacity = '0';
                bookletContainer.style.transition = 'opacity 1s';
                setTimeout(() => {
                    bookletContainer.style.display = 'none';
                    explocionFinalDeFotos();
                }, 1000);
            }
        };

        function explocionFinalDeFotos() {
            const container = document.getElementById('heart-container');
            container.style.display = 'block';
            const num = 15; // Usamos 15 fotos para el corazón

            for (let i = 1; i <= num; i++) {
                const f = document.createElement('div');
                f.className = 'final-photo-frame';
                f.innerHTML = `<img src="foto${i}.jpg">`;
                container.appendChild(f);

                const t = (i / num) * 2 * Math.PI;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                const s = Math.min(window.innerWidth, window.innerHeight) * 0.02;

                setTimeout(() => {
                    f.style.opacity = '1';
                    f.style.left = (x * s + window.innerWidth/2 - 37) + 'px';
                    f.style.top = (y * s + window.innerHeight/2 - 37) + 'px';
                    f.style.transform = `rotate(${(Math.random()-0.5)*30}deg)`;
                }, i * 150);
            }
        }
    </script>
</body>
</html>
