<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Monsi ❤️</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            font-family: 'Arial', sans-serif; color: white;
        }

        /* --- CAPAS DE FONDO --- */
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        
        #space-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000 url('https://i.imgur.com/Y4M9Z4P.png') repeat;
            display: none; z-index: 0;
        }

        /* --- CONTENEDORES DE TEXTO --- */
        .overlay {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10; text-align: center;
        }

        #countdown { font-size: 120px; font-weight: bold; color: #ff007f; text-shadow: 0 0 20px #ff007f; }

        #love-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px); display: none; max-width: 80%;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.2);
        }

        .love-text { font-size: 1.4rem; line-height: 1.6; color: #ffe0eb; margin: 0; }

        /* --- FOTOS EN CORAZÓN --- */
        #heart-container { position: absolute; width: 100%; height: 100%; display: none; z-index: 5; }

        .photo-frame {
            position: absolute; width: 70px; height: 70px;
            border: 2px solid white; border-radius: 5px; overflow: hidden;
            box-shadow: 0 0 15px #ff007f, 0 0 25px #ff007f;
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; background: white;
        }

        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* Botón inicial (necesario para activar música) */
        #start-btn {
            padding: 15px 30px; font-size: 20px; background: #ff007f;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px #ff007f; z-index: 100;
        }
    </style>
</head>
<body>

    <!-- Música -->
    <audio id="musica" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <div id="ui-layer" class="overlay">
        <button id="start-btn">Toca aquí, Monsi ❤️</button>
        <div id="countdown" style="display:none">3</div>
        <div id="love-card">
            <p class="love-text">
                "As long as you're smiling, I'm happy.<br>
                Stay happy, my love.<br>
                ¡Feliz Cumpleaños, Monsi!"
            </p>
        </div>
    </div>

    <canvas id="matrix"></canvas>
    <div id="space-bg"></div>
    <div id="heart-container"></div>

    <script>
        const btn = document.getElementById('start-btn');
        const audio = document.getElementById('musica');
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        const countdown = document.getElementById('countdown');
        const loveCard = document.getElementById('love-card');
        const spaceBg = document.getElementById('space-bg');
        const heartContainer = document.getElementById('heart-container');

        // 1. CONFIGURACIÓN MATRIX
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const phrase = "FELIZCUMPLEAÑOSMONSI";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff007f";
            ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const text = phrase.charAt(y % phrase.length);
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        let matrixInterval;

        // 2. INICIO DE LA EXPERIENCIA
        btn.onclick = () => {
            btn.style.display = 'none';
            audio.play();
            matrixInterval = setInterval(drawMatrix, 33);
            
            // Iniciar cuenta regresiva tras 4 segundos de Matrix
            setTimeout(iniciarCuenta, 4000);
        };

        function iniciarCuenta() {
            canvas.style.opacity = '0';
            canvas.style.transition = 'opacity 2s';
            countdown.style.display = 'block';
            let c = 3;
            const timer = setInterval(() => {
                c--;
                if(c > 0) countdown.innerText = c;
                else {
                    clearInterval(timer);
                    countdown.style.display = 'none';
                    mostrarMensajeYFotos();
                }
            }, 1000);
        }

        function mostrarMensajeYFotos() {
            clearInterval(matrixInterval);
            canvas.style.display = 'none';
            spaceBg.style.display = 'block';
            loveCard.style.display = 'block';
            
            // Tras 5 segundos de mensaje, formar el corazón
            setTimeout(() => {
                loveCard.style.opacity = '0';
                loveCard.style.transition = 'opacity 1s';
                setTimeout(() => { 
                    loveCard.style.display = 'none'; 
                    crearCorazon(); 
                }, 1000);
            }, 5000);
        }

        function crearCorazon() {
            heartContainer.style.display = 'block';
            const numFotos = 15; // Asegúrate de tener foto1.jpg hasta foto15.jpg
            const width = window.innerWidth;
            const height = window.innerHeight;

            for (let i = 1; i <= numFotos; i++) {
                const frame = document.createElement('div');
                frame.className = 'photo-frame';
                const img = document.createElement('img');
                img.src = `foto${i}.jpg`;
                frame.appendChild(img);
                heartContainer.appendChild(frame);

                // Matemáticas del corazón
                const t = (i / numFotos) * 2 * Math.PI;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                
                const scale = Math.min(width, height) * 0.02;
                const finalX = (x * scale) + (width / 2) - 35;
                const finalY = (y * scale) + (height / 2) - 35;

                // Animación
                setTimeout(() => {
                    frame.style.opacity = '1';
                    frame.style.left = finalX + 'px';
                    frame.style.top = finalY + 'px';
                    frame.style.transform = `rotate(${(Math.random()-0.5)*20}deg)`;
                }, i * 200);
            }
        }
    </script>
</body>
</html>
