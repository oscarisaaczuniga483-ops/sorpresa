<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Monsi ❤️</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: black; font-family: 'Georgia', serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #space-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000 url('https://i.imgur.com/Y4M9Z4P.png') repeat; display: none; z-index: 0; }

        .overlay { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 10; text-align: center; }
        
        /* --- ESTILO DEL "LIBRITO" (TARJETA BLANCA) --- */
        #message-card {
            background: white;
            width: 80%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 0, 127, 0.3);
            display: none;
            transform: translateY(50px);
            transition: all 1s ease;
            position: relative;
        }

        #message-text {
            color: #333;
            font-size: 1.2rem;
            font-style: italic;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .heart-icon { color: #ff007f; font-size: 1.5rem; margin-top: 10px; }

        /* --- OTROS ELEMENTOS --- */
        #countdown { font-size: 120px; font-weight: bold; color: #ff007f; text-shadow: 0 0 20px #ff007f; z-index: 20; }
        #start-btn { padding: 15px 30px; font-size: 20px; background: #ff007f; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px #ff007f; z-index: 100; }

        .photo-frame {
            position: absolute; width: 75px; height: 75px; border: 2px solid white; border-radius: 5px; 
            overflow: hidden; box-shadow: 0 0 15px #ff007f; transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; z-index: 5;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <audio id="musica" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <div class="overlay">
        <button id="start-btn">Para Monsi ❤️</button>
        <div id="countdown" style="display:none">3</div>
        
        <!-- EL LIBRITO / TARJETA -->
        <div id="message-card">
            <div id="message-text">Cargando mensajes...</div>
            <div class="heart-icon">♥</div>
        </div>
    </div>

    <canvas id="matrix"></canvas>
    <div id="space-bg"></div>
    <div id="heart-container"></div>

    <script>
        // CONFIGURACIÓN DE MENSAJES QUE CAMBIAN
        const mensajes = [
            "Hola, mi amor...",
            "Hoy es un día muy especial.",
            "Tengo una pequeña sorpresa para ti.",
            "Gracias por cada sonrisa...",
            "Y por ser la persona increíble que eres.",
            "As long as you're smiling, I'm happy.",
            "Stay happy, my love.",
            "¡Feliz Cumpleaños, Monsi! ❤️"
        ];

        const btn = document.getElementById('start-btn');
        const audio = document.getElementById('musica');
        const countdown = document.getElementById('countdown');
        const messageCard = document.getElementById('message-card');
        const messageText = document.getElementById('message-text');
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        // MATRIX LOGIC
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const phrase = "FELIZCUMPLEAÑOSMONSI";
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff007f"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(phrase.charAt(y % phrase.length), i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        let mInterval;

        btn.onclick = () => {
            btn.style.display = 'none';
            audio.play();
            mInterval = setInterval(drawMatrix, 33);
            setTimeout(iniciarCuenta, 3000);
        };

        function iniciarCuenta() {
            canvas.style.opacity = '0';
            countdown.style.display = 'block';
            let c = 3;
            const t = setInterval(() => {
                c--;
                if(c > 0) countdown.innerText = c;
                else {
                    clearInterval(t); countdown.style.display = 'none';
                    mostrarLibrito();
                }
            }, 1000);
        }

        function mostrarLibrito() {
            clearInterval(mInterval);
            canvas.style.display = 'none';
            document.getElementById('space-bg').style.display = 'block';
            messageCard.style.display = 'block';
            setTimeout(() => messageCard.style.transform = "translateY(0)", 100);

            let msgIndex = 0;
            const msgInterval = setInterval(() => {
                if (msgIndex < mensajes.length) {
                    messageText.style.opacity = 0;
                    setTimeout(() => {
                        messageText.innerText = mensajes[msgIndex];
                        messageText.style.opacity = 1;
                        messageText.style.transition = "opacity 0.5s";
                        msgIndex++;
                    }, 500);
                } else {
                    clearInterval(msgInterval);
