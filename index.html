<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Monsi ❤️</title>
    <style>
    body { margin: 0; overflow: hidden; background: black; font-family: 'Arial', sans-serif; }
    canvas { display: block; }

    #overlay {
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100vw; 
        height: 100vh; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        z-index: 10;
        pointer-events: none; /* Para que no interfiera con clics */
    }

    .countdown { 
        font-size: 100px; 
        font-weight: bold; 
        color: #ff007f; 
    }

    .message { 
        font-size: 3rem; 
        display: none; 
        color: #ff007f;
        text-shadow: 0 0 20px #ff007f; 
        text-align: center;
        padding: 20px;
    }
</style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="overlay">
        <div id="number" class="countdown">3</div>
        <div id="final-msg" class="message">¡FELIZ CUMPLEAÑOS MONSI! 💖</div>
    </div>

    <script>
        // --- EFECTO MATRIX ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- EL CAMBIO ESTÁ AQUÍ ---
        // Definimos la frase que queremos que caiga. 
        // Usamos letras mayúsculas para que se lea mejor en el efecto lluvia.
        const phrase = "FELIZCUMPLEAÑOSMONSI"; 
        
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff007f"; // Rosa brillante
            ctx.font = fontSize + "px monospace";

            drops.forEach((y, i) => {
                // En lugar de elegir una letra aleatoria de un montón,
                // elegimos la letra que corresponde a la altura 'y' dentro de nuestra frase
                // Usamos el operador % (módulo) para que la frase se repita infinitamente hacia abajo
                const text = phrase.charAt(y % phrase.length);
                
                ctx.fillText(text, i * fontSize, y * fontSize);
                
                // Reiniciamos la gota si llega al final o aleatoriamente para dar variedad
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 33);

        // --- CUENTA REGRESIVA ---
        let count = 3;
        const numElement = document.getElementById('number');
        const msgElement = document.getElementById('final-msg');

        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                numElement.innerText = count;
            } else {
                clearInterval(interval);
                numElement.style.display = 'none';
                msgElement.style.display = 'block';
                // Efecto de latido en el mensaje final
                animarMensaje();
            }
        }, 1000);

        function animarMensaje() {
    // Calculamos la escala basada en el tiempo para el efecto de latido
    const escala = 1 + Math.sin(Date.now() / 500) * 0.1;
    msgElement.style.transform = `scale(${escala})`;
    requestAnimationFrame(animarMensaje);
}
    </script>
</body>
</html>
